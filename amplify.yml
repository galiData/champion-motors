version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Amplify's default image may ship an older Node than the project needs.
        - nvm install 22
        - nvm use 22
        - node -v
        - npm ci
        # The same gates GitHub Actions runs, so a broken commit cannot deploy
        # even if it somehow reaches this branch.
        - npm run lint
        - npm run test:run
    build:
      commands:
        # `npm run build` typechecks with `tsc -b` before Vite bundles.
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
