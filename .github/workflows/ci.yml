name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch makes an in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # `npm ci` installs exactly the committed lockfile and fails if
      # package.json and package-lock.json have drifted apart.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      # Keeps the production bundle inspectable when a run looks wrong.
      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist
          retention-days: 7
          if-no-files-found: ignore
