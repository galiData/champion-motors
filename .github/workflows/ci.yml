name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch makes an in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Node 22 bundles whichever npm patch it shipped with, and that moves
      # under us. npm minor versions disagree about how optional and peer
      # transitive deps are recorded, so an unpinned runner can reject a
      # perfectly good lockfile. `packageManager` in package.json is the
      # single source of truth — update it there, not here.
      - name: Pin npm to the version in package.json
        run: |
          npm_version="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          echo "Pinning npm to $npm_version"
          npm install -g "npm@$npm_version"
          npm --version

      # `npm ci` installs exactly the committed lockfile and fails if
      # package.json and package-lock.json have drifted apart.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      # Keeps the production bundle inspectable when a run looks wrong.
      - name: Upload build output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dist
          path: dist
          retention-days: 7
          if-no-files-found: ignore
